{% extends 'portal/base.html' %}
{% block title %}Edit {{ item_label }}{% endblock %}
{% block page_heading %}Edit {{ item_label }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="panel">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
        <div>
          <h3 class="mb-1">Edit {{ item_label }}</h3>
          <p class="text-muted mb-0">Current record: {{ object }}</p>
        </div>
        <a class="btn btn-light" href="{{ cancel_url }}">Back</a>
      </div>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary" type="submit">Save changes</button>
          <a class="btn btn-outline-secondary" href="{{ cancel_url }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
