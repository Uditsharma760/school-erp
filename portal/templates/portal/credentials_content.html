<div class="credential-card"><div class="credential-icon"><i class="bi bi-key-fill"></i></div><h3>Credentials generated</h3><p>{{ credentials.name|default:'Staff member' }}</p><div class="credential-row"><span>User ID</span><code>{{ credentials.username }}</code></div><div class="credential-row"><span>Temporary password</span><code>{{ credentials.password }}</code></div><div class="alert alert-warning small mt-3 mb-0">Copy these credentials now. The plain password is not stored and cannot be displayed again.</div></div>
