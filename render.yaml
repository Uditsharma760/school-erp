services:
  - type: web
    name: school-erp-pro
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py create_initial_admin && gunicorn schoolerp.wsgi:application --workers 2 --timeout 120
    healthCheckPath: /login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: school-erp-pro-db
          property: connectionString

databases:
  - name: school-erp-pro-db
    plan: free
